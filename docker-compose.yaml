version: '3.11'

services:
  web:
    build:
      context: ./
    command:  >
      bash -c "python manage.py collectstatic --noinput && 
      python manage.py migrate && 
      gunicorn djangoset.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/bot/static
      - media_volume:/bot/media
    expose:
      - 8000
    restart: always
    env_file:
      - .env
    depends_on:
      - database

  database:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - 5432:5432
    restart: always

  bot:
    build:
      context: ./
    container_name: bot
    restart: always
    command: python main.py
    env_file:
      - .env
    depends_on:
      - web
  nginx:
    build: ./nginx
    volumes:
      - static_volume:/bot/static
      - media_volume:/bot/media
    ports:
      - 1337:80
    restart: always
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: